<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tìm kiếm sản phẩm</title>
</head>
<body>

<input type="text" id="kw" placeholder="Nhập từ khóa">
<button onclick="search()">Tìm kiếm</button>

<ul id="result"></ul>

<script>
function search() {
    let q = document.getElementById("kw").value;

    fetch("search.php?q=" + encodeURIComponent(q))
        .then(res => res.json())
        .then(data => {
            document.getElementById("result").innerHTML =
                data.map(p => `
                    <li>${p.name} - ${p.price}</li>
                `).join("");
        })
        .catch(err => {
            console.error(err);
            document.getElementById("result").innerHTML =
                "<li>Có lỗi xảy ra.</li>";
        });
}
</script>

</body>
</html>
